<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Farmer's Friend</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#1a4f7a;--sky-dark:#0f3252;--sky-deeper:#0a2238;
  --sky-light:#2d7ab8;--sky-pale:#e8f3fb;--sky-mid:#b8d9f0;
  --grass:#2d7a3a;--grass-light:#3d9e4e;--grass-dark:#1e5228;
  --wheat:#e8b84b;--wheat-dark:#c49020;
  --white:#fff;--off-white:#f7fafd;
  --slate:#4a6075;--slate-light:#7a9ab5;
  --border:#d0e4f0;--danger:#c0392b;--danger-dark:#922b21;
  --orange:#e67e22;--orange-dark:#ca6f1e;--purple:#6c3483;
  --shadow:0 4px 16px rgba(26,79,122,.12);
  --shadow-lg:0 8px 32px rgba(26,79,122,.18);
  --radius:6px;--radius-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--off-white);color:var(--sky-deeper);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--off-white);}::-webkit-scrollbar-thumb{background:var(--sky-mid);border-radius:3px;}
label{font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);display:block;margin-bottom:5px;}
input,select,textarea{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--sky-deeper);padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:.93rem;width:100%;transition:border-color .15s,box-shadow .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--sky-light);box-shadow:0 0 0 3px rgba(45,122,184,.12);}
input::placeholder,textarea::placeholder{color:var(--slate-light);}
textarea{resize:vertical;min-height:68px;}
.btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;padding:10px 20px;border:none;border-radius:var(--radius);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{background:var(--sky);color:white;box-shadow:0 2px 0 var(--sky-dark);}
.btn-primary:hover:not(:disabled){background:var(--sky-light);transform:translateY(-1px);}
.btn-success{background:var(--grass);color:white;box-shadow:0 2px 0 var(--grass-dark);}
.btn-success:hover:not(:disabled){background:var(--grass-light);transform:translateY(-1px);}
.btn-danger{background:var(--danger);color:white;box-shadow:0 2px 0 var(--danger-dark);}
.btn-wheat{background:var(--wheat);color:var(--sky-deeper);box-shadow:0 2px 0 var(--wheat-dark);font-weight:700;}
.btn-wheat:hover:not(:disabled){background:#f0c85a;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--slate);border:1.5px solid var(--border);}
.btn-ghost:hover:not(:disabled){border-color:var(--sky-light);color:var(--sky);background:var(--sky-pale);}
.btn-sm{padding:6px 14px;font-size:.8rem;}
.btn-lg{padding:12px 28px;font-size:1rem;}
.btn-full{width:100%;justify-content:center;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;box-shadow:0 1px 4px rgba(26,79,122,.08);}
.card-title{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--sky-dark);margin-bottom:20px;display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid .full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;}
.sec-hdr{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--sky);margin:20px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--sky-pale);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;}
.badge-out{background:rgba(192,57,43,.1);color:var(--danger);border:1px solid rgba(192,57,43,.2);}
.badge-in{background:rgba(45,122,58,.1);color:var(--grass);border:1px solid rgba(45,122,58,.2);}
.badge-overdue{background:rgba(232,184,75,.15);color:var(--wheat-dark);border:1px solid rgba(232,184,75,.3);}
.badge-pass{background:rgba(45,122,58,.1);color:var(--grass);border:1px solid rgba(45,122,58,.2);}
.badge-fail{background:rgba(192,57,43,.1);color:var(--danger);border:1px solid rgba(192,57,43,.2);}
.badge-holding{background:rgba(230,126,34,.12);color:var(--orange);border:1px solid rgba(230,126,34,.25);}
.badge-clear{background:rgba(45,122,58,.1);color:var(--grass);border:1px solid rgba(45,122,58,.2);}
.badge-visitor{background:rgba(26,79,122,.1);color:var(--sky);border:1px solid rgba(26,79,122,.2);}
.badge-risk{background:rgba(192,57,43,.1);color:var(--danger);border:1px solid rgba(192,57,43,.2);}
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;background:var(--white);font-size:.85rem;}
thead{background:var(--sky-pale);border-bottom:2px solid var(--border);}
th{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sky);padding:11px 14px;text-align:left;white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--sky-pale);}
.emp-chip{display:inline-flex;align-items:center;gap:6px;background:var(--sky-pale);border:1px solid var(--border);border-radius:20px;padding:2px 10px 2px 3px;font-size:.8rem;}
.emp-av{width:22px;height:22px;background:var(--sky);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:white;flex-shrink:0;}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 20px;border-radius:var(--radius);font-weight:600;font-size:.88rem;box-shadow:var(--shadow-lg);animation:tIn .3s ease forwards;max-width:320px;color:white;}
.toast.success{background:var(--grass);}
.toast.error{background:var(--danger);}
.toast.warning{background:var(--orange);}
@keyframes tIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
.spinner-dark{border-color:rgba(26,79,122,.2);border-top-color:var(--sky);}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:40px 20px;color:var(--slate-light);}
.empty .icon{font-size:2.2rem;display:block;margin-bottom:8px;opacity:.4;}
.error-msg{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);border-radius:var(--radius);padding:10px 14px;color:var(--danger);font-size:.88rem;margin-top:4px;}
.modal-bg{position:fixed;inset:0;background:rgba(10,34,56,.75);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000;}
.modal{background:white;border-radius:var(--radius-lg);padding:28px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--slate);font-size:1.2rem;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s;}
.modal-close:hover{background:var(--sky-pale);}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.88rem;gap:12px;}
.detail-key{font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);white-space:nowrap;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;border-top:3px solid var(--sky);box-shadow:0 1px 4px rgba(26,79,122,.08);transition:transform .15s,box-shadow .15s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.stat-number{font-family:'DM Serif Display',serif;font-size:2.4rem;line-height:1;color:var(--sky);margin-bottom:4px;}
.stat-label{font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);}
/* Sidebar nav */
.app-wrap{display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--sky-dark);flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;overflow-y:auto;}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-logo .logo-icon{width:40px;height:40px;background:var(--wheat);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:10px;}
.sidebar-logo .app-name{font-family:'DM Serif Display',serif;font-size:1.1rem;color:white;line-height:1.2;}
.sidebar-logo .farm-name{font-size:.72rem;color:var(--sky-mid);margin-top:3px;letter-spacing:.08em;text-transform:uppercase;}
.sidebar-section{padding:12px 10px 4px;font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sky-mid);opacity:.7;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:2px 6px;border-radius:var(--radius);cursor:pointer;transition:all .15s;color:rgba(255,255,255,.7);font-size:.88rem;font-weight:500;border:none;background:none;width:calc(100% - 12px);text-align:left;}
.nav-item:hover{background:rgba(255,255,255,.08);color:white;}
.nav-item.active{background:rgba(232,184,75,.15);color:var(--wheat);border:1px solid rgba(232,184,75,.2);}
.nav-item .nav-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--danger);color:white;border-radius:10px;padding:1px 7px;font-size:.68rem;font-weight:700;}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid rgba(255,255,255,.1);}
.main-area{margin-left:220px;flex:1;display:flex;flex-direction:column;}
.top-bar{background:white;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:40;box-shadow:0 1px 4px rgba(26,79,122,.06);}
.top-bar-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--sky-dark);}
.page-content{padding:24px;flex:1;}
/* Camera */
.cam-box{background:var(--sky-pale);border:2px dashed var(--border);border-radius:var(--radius);overflow:hidden;position:relative;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cam-box video,.cam-box img.preview{width:100%;max-height:200px;object-fit:cover;display:block;}
.cam-ts{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(10,34,56,.8));padding:6px 10px;font-size:.72rem;color:var(--wheat);font-weight:600;}
.cam-ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--slate-light);font-size:.85rem;padding:20px;text-align:center;}
.cam-controls{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
/* Check items */
.check-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;}
.check-item.pass{border-color:var(--grass);background:rgba(45,122,58,.03);}
.check-item.fail{border-color:var(--danger);background:rgba(192,57,43,.03);}
.check-item.na{opacity:.6;}
.check-btns{display:flex;gap:5px;flex-shrink:0;}
.ck-btn{padding:4px 12px;border:1.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-family:'DM Sans';font-size:.78rem;font-weight:600;transition:all .15s;}
.ck-btn.pass-btn{border-color:var(--grass);color:var(--grass);}
.ck-btn.pass-btn.active{background:var(--grass);color:white;}
.ck-btn.fail-btn{border-color:var(--danger);color:var(--danger);}
.ck-btn.fail-btn.active{background:var(--danger);color:white;}
.ck-btn.na-btn{border-color:var(--slate-light);color:var(--slate);}
.ck-btn.na-btn.active{background:var(--slate);color:white;}
/* Biosec */
.biosec-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;}
.biosec-item.risk{border-color:var(--danger);background:rgba(192,57,43,.03);}
.biosec-item.ok{border-color:var(--grass);background:rgba(45,122,58,.03);}
.bio-btns{display:flex;gap:5px;flex-shrink:0;}
.bio-btn{padding:4px 14px;border:1.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-family:'DM Sans';font-size:.82rem;font-weight:600;transition:all .15s;}
.bio-btn.yes-btn{border-color:var(--grass);color:var(--grass);}
.bio-btn.yes-btn.active{background:var(--grass);color:white;}
.bio-btn.no-btn{border-color:var(--danger);color:var(--danger);}
.bio-btn.no-btn.active{background:var(--danger);color:white;}
/* WHP bar */
.whp-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:4px;}
.whp-fill{height:100%;border-radius:3px;}
/* Vehicle cards */
.veh-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.veh-card:hover{border-color:var(--sky-light);box-shadow:var(--shadow);transform:translateY(-1px);}
/* On-site cards */
.onsite-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:center;gap:14px;border-left:4px solid var(--grass);margin-bottom:8px;}
/* Report toggle */
.mod-toggle{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .15s;}
.mod-toggle.on{border-color:var(--sky-light);background:var(--sky-pale);}
.tog-sw{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;flex-shrink:0;transition:background .2s;}
.tog-sw.on{background:var(--sky);}
.tog-sw::after{content:'';position:absolute;width:16px;height:16px;background:white;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog-sw.on::after{transform:translateX(18px);}
/* Sig pad */
.sig-pad{border:2px solid var(--border);border-radius:var(--radius);background:var(--sky-pale);cursor:crosshair;touch-action:none;display:block;width:100%;height:110px;}
/* Alert box */
.alert-box{background:rgba(230,126,34,.07);border:1px solid rgba(230,126,34,.25);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;font-size:.87rem;color:var(--orange-dark);}
.alert-box strong{display:block;margin-bottom:3px;}
/* Mobile */
.mob-menu-btn{display:none;}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;}
  .sidebar.open{transform:translateX(0);}
  .main-area{margin-left:0;}
  .mob-menu-btn{display:flex;}
  .form-grid{grid-template-columns:1fr;}
  .form-grid .full{grid-column:1;}
  .card{padding:16px;}
}
</style>
</head>

// ── API ───────────────────────────────────────────────────────────────────
function tok(){return S.session?S.session.access_token:'';}
async function api(path,opts){
  opts=opts||{};
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+tok(),'Content-Type':'application/json','Prefer':'return=representation'};
  Object.assign(h,opts.headers||{});
  var res=await fetch(SB_URL+'/rest/v1/'+path,{headers:h,method:opts.method||'GET',body:opts.body});
  if(res.status===204)return null;
  var data=await res.json();
  if(!res.ok)throw new Error(data.message||data.error_description||'Error');
  return data;
}
async function authApi(path,body){
  var res=await fetch(SB_URL+'/auth/v1/'+path,{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
  var data=await res.json();
  if(data.error||data.error_description)throw new Error(data.error_description||data.error||data.msg);
  return data;
}

function toast(msg,type){

// ── Helpers ───────────────────────────────────────────────────────────────
function fmt(iso){if(!iso)return'—';return new Date(iso).toLocaleString('en-AU',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtD(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'});}
function getV(id){var el=document.getElementById(id);return el?el.value:'';}
function dur(a,b){if(!a||!b)return'—';var m=Math.round((new Date(b)-new Date(a))/60000);return m<60?m+' min':Math.floor(m/60)+'h '+(m%60)+'m';}
function inRange(iso,f,t){if(!iso)return false;var d=new Date(iso);return d>=new Date(f)&&d<=new Date(t+'T23:59:59');}
function whpStatus(r){
  if(!r.withholding_days||r.withholding_days===0)return{label:'No WHP',cls:'badge-visitor',pct:0};
  var cd=new Date(new Date(r.applied_at).getTime()+r.withholding_days*86400000);
  var now=new Date();
  if(now>=cd)return{label:'Cleared',cls:'badge-clear',pct:100,cd:cd};
  var pct=Math.round(((now-new Date(r.applied_at))/(cd-new Date(r.applied_at)))*100);
  var days=Math.ceil((cd-now)/86400000);
  return{label:days+' days left',cls:'badge-holding',pct:pct,cd:cd,days:days};
}
function biosecRisk(ans){
  return['other_farms','livestock','overseas','sick','animals'].some(function(id){return ans[id]==='yes';})||
         ['footwear','vehicle'].some(function(id){return ans[id]==='no';});
}

// ── Camera ────────────────────────────────────────────────────────────────
async function startCam(prefix){
  try{
    var stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    S[prefix+'Stream']=stream;
    var vid=document.getElementById(prefix+'-vid');
    vid.srcObject=stream;vid.style.display='block';
    document.getElementById(prefix+'-ph').style.display='none';
    document.getElementById(prefix+'-cap').disabled=false;
  }catch(e){toast('Camera not available — allow camera access','error');}
}
function captureCam(prefix){
  var vid=document.getElementById(prefix+'-vid');
  var c=document.createElement('canvas');c.width=vid.videoWidth||640;c.height=vid.videoHeight||480;
  var ctx=c.getContext('2d');ctx.drawImage(vid,0,0);
  var now=new Date();
  ctx.fillStyle='rgba(10,34,56,0.65)';ctx.fillRect(0,c.height-36,c.width,36);
  ctx.fillStyle='#e8b84b';ctx.font='bold 14px monospace';
  ctx.fillText((S.farm?S.farm.name:'Farm')+' · '+now.toLocaleString('en-AU'),10,c.height-10);
  var stream=S[prefix+'Stream'];if(stream)stream.getTracks().forEach(function(t){t.stop();});
  S[prefix+'Stream']=null;
  S[prefix+'Photo']={dataUrl:c.toDataURL('image/jpeg',.85),ts:now.toLocaleString('en-AU')};
  render();
}
function retakeCam(prefix){S[prefix+'Photo']=null;render();}

function camHtml(prefix,label){
  var photo=S[prefix+'Photo'];
  return '<div class="form-group full"><label>'+label+'</label>'+

    '<span style="font-size:2rem;opacity:.35;">📷</span><span>Camera inactive</span></div>'+
    '<video id="'+prefix+'-vid" autoplay playsinline style="display:none;"></video>'+
    (photo?'<img class="preview" src="'+photo.dataUrl+'"><div class="cam-ts">'+photo.ts+'</div>':'')+
    '</div>'+
    '<div class="cam-controls">'+
    (!photo?'<button type="button" class="btn btn-ghost btn-sm" onclick="startCam(\''+prefix+'\')">▶ Start Camera</button>'+

// ── Sig pad ───────────────────────────────────────────────────────────────
function initSig(){
  var c=document.getElementById('sig-pad');if(!c)return;
  var ctx=c.getContext('2d');ctx.strokeStyle='#0a2238';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  function pos(e){var r=c.getBoundingClientRect();var s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
  c.addEventListener('mousedown',function(e){S.sigDrawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  c.addEventListener('mousemove',function(e){if(!S.sigDrawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  c.addEventListener('mouseup',function(){S.sigDrawing=false;S.sigData=c.toDataURL();});
  c.addEventListener('touchstart',function(e){e.preventDefault();S.sigDrawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  c.addEventListener('touchmove',function(e){e.preventDefault();if(!S.sigDrawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  c.addEventListener('touchend',function(){S.sigDrawing=false;S.sigData=document.getElementById('sig-pad').toDataURL();});
}
function clearSig(){var c=document.getElementById('sig-pad');if(c){c.getContext('2d').clearRect(0,0,c.width,c.height);S.sigData=null;}}

async function submitPre(){
  var name=getV('pre-name');var opId=getV('pre-op');
  if(!S.selVehicle){toast('Select vehicle type','error');return;}
  if(!name){toast('Enter vehicle name','error');return;}
  if(!opId){toast('Select operator','error');return;}
  var checks=VEHICLES[S.selVehicle].checks;
  var unanswered=checks.filter(function(c){return!S.checkResults[c.id];});
  if(unanswered.length>0){toast(unanswered.length+' items not answered','error');return;}
  var mem=S.members.find(function(m){return m.id===opId;});
  var fails=checks.filter(function(c){return S.checkResults[c.id]==='fail';}).map(function(c){return c.l;});
  var result=fails.length>0?'fail':'pass';
  try{
    await api('prestart_records',{method:'POST',body:JSON.stringify({
      farm_id:S.farm.id,vehicle_type:S.selVehicle,vehicle_name:name,
      operator_id:opId,operator_name:mem?mem.display_name:'Unknown',
      checked_at:new Date().toISOString(),
      odometer_km:parseFloat(getV('pre-odo'))||null,hours_reading:parseFloat(getV('pre-hrs'))||null,
      check_results:S.checkResults,failed_items:fails,overall_result:result,
      notes:getV('pre-notes')||null,photo_url:null
    })});
    if(result==='fail')toast('⚠ Pre-start logged — DEFECTS recorded!','warning');
    else toast('✓ Pre-start check passed and logged');
    S.checkResults={};S.prePhoto=null;S.selVehicle=null;S.subpage='log';await loadAll();render();
  }catch(e){toast(e.message,'error');}
}

function exportPre(){

async function submitVisitor(){
  var name=getV('v-name');var type=getV('v-type');var purpose=getV('v-purpose');
  if(!name){toast('Visitor name required','error');return;}
  if(!type){toast('Select visitor type','error');return;}
  if(!purpose){toast('Purpose of visit required','error');return;}
  var unanswered=BIOSEC_QS.filter(function(q){return!S.biosecAns[q.id];});
  if(unanswered.length>0){toast('Please answer all biosecurity questions','error');return;}
  var risk=biosecRisk(S.biosecAns);
  try{
    await api('visitor_records',{method:'POST',body:JSON.stringify({
      farm_id:S.farm.id,visitor_name:name,company:getV('v-company')||null,
      visitor_type:type,phone:getV('v-phone')||null,purpose:purpose,
      host_name:getV('v-host')||null,signed_in_at:new Date().toISOString(),
      biosec_answers:S.biosecAns,biosec_risk:risk,
      signature:S.sigData||null,notes:getV('v-notes')||null,status:'on-site'
    })});
    if(risk)toast('⚠ Visitor signed in — BIOSECURITY RISK flagged','warning');
    else toast('✓ '+name+' signed in');
    S.biosecAns={};S.sigData=null;S.subpage='onsite';await loadAll();render();
  }catch(e){toast(e.message,'error');}
}

}

function setRptRange(i){
  var to=new Date();var from=new Date();
  if(i===0){from.setDate(from.getDate()-30);}
  else if(i===1){from.setDate(from.getDate()-90);}
  else if(i===2){from.setMonth(from.getMonth()-6);}
  else if(i===3){from=new Date(to.getFullYear(),0,1);}
  else{from=new Date(to.getFullYear()-1,0,1);to=new Date(to.getFullYear()-1,11,31);}
  S.rptFrom=from.toISOString().slice(0,10);S.rptTo=to.toISOString().slice(0,10);
  S.rptGenerated=false;render();
}

async function generateReport(){
  S.rptGenerating=true;S.rptGenerated=false;render();
  await loadAll();
  var from=getV('rpt-from')||S.rptFrom;var to=getV('rpt-to')||S.rptTo;
  S.rptData={
    from:from,to:to,generated:new Date().toISOString(),
    shed:S.rptMods.shed?S.shedRecs.filter(function(r){return inRange(r.checkout_at,from,to);}):[] ,
    chem:S.rptMods.chem?S.chemRecs.filter(function(r){return inRange(r.applied_at,from,to);}):[] ,
    pre:S.rptMods.pre?S.preRecs.filter(function(r){return inRange(r.checked_at,from,to);}):[] ,
    vis:S.rptMods.vis?S.visRecs.filter(function(r){return inRange(r.signed_in_at,from,to);}):[]
  };
  S.rptGenerating=false;S.rptGenerated=true;render();
  toast('✓ Report ready — '+(S.rptData.shed.length+S.rptData.chem.length+S.rptData.pre.length+S.rptData.vis.length)+' records');
}

      [['Chemical',r.chemical_name],['APVMA',r.apvma_number||'—'],['Paddock',r.paddock],['Crop',r.crop_or_target||'—'],['Area',r.area_treated_ha?r.area_treated_ha+' ha':'—'],['Rate',r.application_rate||'—'],['Water Volume',r.water_volume||'—'],['Method',r.application_method||'—'],['Applied',fmt(r.applied_at)],['Operator',r.operator_name],['Licence',r.operator_licence||'—'],['Wind',r.wind_speed_kmh?r.wind_speed_kmh+' km/h '+(r.wind_direction||''):'—'],['Temperature',r.temperature_c?r.temperature_c+'°C':'—'],['WHP Days',r.withholding_days||'0'],['Clears',cd?fmtD(cd.toISOString()):'—'],['Re-entry',r.reentry_hours?r.reentry_hours+' hours':'—'],['Notes',r.notes||'—']].map(function(f){return'<div class="detail-row"><span class="detail-key">'+f[0]+'</span><span style="text-align:right;">'+f[1]+'</span></div>';}).join('');
  }else if(m.type==='pre'){
    var vt=VEHICLES[r.vehicle_type]||{icon:'⚙️'};
    var checks=r.check_results||{};
    body='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">'+
      '<div style="font-size:2rem;">'+vt.icon+'</div>'+
      '<div><h2 style="font-family:\'DM Serif Display\',serif;font-size:1.2rem;color:var(--sky-dark);">'+r.vehicle_name+'</h2>'+
      '<div>'+(r.overall_result==='fail'?'<span class="badge badge-fail">✗ Defects</span>':'<span class="badge badge-pass">✓ Pass</span>')+'</div></div></div>'+
      [['Type',r.vehicle_type],['Operator',r.operator_name],['Date & Time',fmt(r.checked_at)],['Odometer',r.odometer_km?r.odometer_km+' km':'—'],['Hours',r.hours_reading?r.hours_reading+' hrs':'—'],['Defects',r.failed_items&&r.failed_items.length?r.failed_items.join(', '):'None'],['Notes',r.notes||'—']].map(function(f){return'<div class="detail-row"><span class="detail-key">'+f[0]+'</span><span style="text-align:right;">'+f[1]+'</span></div>';}).join('')+
      (VEHICLES[r.vehicle_type]?'<div class="sec-hdr" style="margin-top:14px;">Checklist Results</div>'+VEHICLES[r.vehicle_type].checks.map(function(c){var res=checks[c.id]||'—';var col=res==='pass'?'var(--grass)':res==='fail'?'var(--danger)':'var(--slate-light)';return'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.85rem;"><span>'+c.l+'</span><span style="color:'+col+';font-weight:600;">'+(res==='pass'?'✓ ':res==='fail'?'✗ ':'')+res+'</span></div>';}).join(''):'');
  }else if(m.type==='vis'){
    var ans=r.biosec_answers||{};
    body='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">'+
      '<div style="width:46px;height:46px;border-radius:50%;background:'+(r.biosec_risk?'var(--danger)':'var(--sky)')+';display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:white;">'+r.visitor_name.charAt(0).toUpperCase()+'</div>'+
      '<div><h2 style="font-family:\'DM Serif Display\',serif;font-size:1.2rem;color:var(--sky-dark);">'+r.visitor_name+'</h2>'+
      '<div><span class="badge badge-visitor">'+r.visitor_type+'</span>'+(r.biosec_risk?' <span class="badge badge-risk">⚠ Risk</span>':'')+
      '</div></div></div>'+
      [['Company',r.company||'—'],['Phone',r.phone||'—'],['Purpose',r.purpose||'—'],['Host',r.host_name||'—'],['Signed In',fmt(r.signed_in_at)],['Signed Out',fmt(r.signed_out_at)],['Duration',dur(r.signed_in_at,r.signed_out_at)],['Status',r.status==='on-site'?'🟢 On Site':'⚫ Departed'],['Notes',r.notes||'—']].map(function(f){return'<div class="detail-row"><span class="detail-key">'+f[0]+'</span><span style="text-align:right;">'+f[1]+'</span></div>';}).join('')+
      '<div class="sec-hdr" style="margin-top:14px;">Biosecurity Declaration</div>'+
      BIOSEC_QS.map(function(q){var a=ans[q.id]||'—';var isRisk=(q.risk&&a==='yes')||(!q.risk&&a==='no');return'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.82rem;"><span style="flex:1;margin-right:12px;">'+q.q+'</span><span style="color:'+(isRisk?'var(--danger)':a!=='—'?'var(--grass)':'var(--slate)')+';font-weight:600;">'+a.toUpperCase()+'</span></div>';}).join('')+
      (r.signature?'<div style="margin-top:12px;"><div style="font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);margin-bottom:6px;">Signature</div><img src="'+r.signature+'" style="border:1px solid var(--border);border-radius:var(--radius);max-width:100%;background:var(--sky-pale);"></div>':'')+
      (r.status==='on-site'?'<button class="btn btn-success btn-full" style="margin-top:14px;" onclick="visSignOut(\''+r.id+'\')">Sign Out Visitor</button>':'');
  }

  return'<div class="modal-bg" onclick="if(event.target===this){S.modal=null;render();}">'+
    '<div class="modal"><button class="modal-close" onclick="S.modal=null;render()">✕</button>'+body+'</div></div>';
}

// ── Utility ───────────────────────────────────────────────────────────────
function dl(content,filename){
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(content);a.download=filename;a.click();
  toast('CSV exported');
}

function goPage(page,sub){
  S.page=page;S.subpage=sub||null;S.menuOpen=false;S.sidebarOpen=false;
  var sidebar=document.getElementById('sidebar');
  if(sidebar)sidebar.classList.remove('open');
  loadAll().then(render);
}

// ── Auth form handler ─────────────────────────────────────────────────────
document.addEventListener('submit',async function(e){
  if(e.target.id!=='auth-form')return;
  e.preventDefault();
  var f=e.target;S.authError='';
  try{
    if(S.authMode==='signup')await doSignUp(f.email.value,f.password.value,f.displayName.value,f.farmName.value);
    else await doSignIn(f.email.value,f.password.value);
    await loadAll();
    toast('Welcome to The Farmer\'s Friend! 🌾');render();
  }catch(err){S.authError=err.message;render();}
});

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot(){
  if(S.session){
    try{
      var uid=S.session.user?S.session.user.id:null;
      if(uid){await loadCtx(uid);await loadAll();}
    }catch(e){doSignOut();return;}
  }
  render();
}
boot();
</script>
</body>
</html>
